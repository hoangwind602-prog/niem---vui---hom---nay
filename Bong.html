<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cục Bông Lười</title>
<style>
  /* ===== Body & Background ===== */
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f3e8ff, #ffe8f0);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  /* ===== Blob ===== */
  .blob-container {
    position: relative;
    text-align: center;
  }

  .blob {
    width: 130px;
    height: 130px;
    background-color: #f8f3ff;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: all 0.2s ease-in-out;
    position: relative;
  }

  /* Glow hiệu ứng khi chạm */
  .blob.glow {
    box-shadow: 0 0 25px 8px rgba(255, 200, 255, 0.6);
    transform: scale(1.1);
  }

  /* Mặt cute */
  .face {
    position: relative;
    width: 70%;
    height: 70%;
  }

  .eye {
    width: 12px;
    height: 12px;
    background-color: #333;
    border-radius: 50%;
    position: absolute;
    top: 30%;
  }

  .eye.left { left: 20%; }
  .eye.right { right: 20%; }

  .mouth {
    width: 20px;
    height: 4px;
    background-color: #ff6f91;
    border-radius: 2px;
    position: absolute;
    bottom: 25%;
    left: 50%;
    transform: translateX(-50%);
  }

  .blush {
    width: 14px;
    height: 8px;
    background-color: #ffb6c1;
    border-radius: 50%;
    position: absolute;
    top: 40%;
  }

  .blush.left { left: 10%; }
  .blush.right { right: 10%; }

  /* Button panel */
  .controls {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
  }

  button {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    background-color: #ffe0f0;
    cursor: pointer;
    font-weight: 500;
    transition: 0.2s;
  }

  button:hover {
    background-color: #ffd0e0;
  }

  /* Name badge */
  .name-badge {
    position: absolute;
    top: -25px;
    left: 50%;
    transform: translateX(-50%);
    background-color: #fff0ff;
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 14px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    transition: 0.3s;
    opacity: 0.9;
  }
</style>
</head>
<body>

<div class="blob-container">
  <div class="name-badge" id="blobName">Cục Bông</div>
  <div class="blob" id="blob">
    <div class="face">
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="mouth"></div>
      <div class="blush left"></div>
      <div class="blush right"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="makeSleep()">Ngủ / Đắp chăn</button>
    <button onclick="changeName()">Đổi tên</button>
  </div>
</div>

<script>
  const blob = document.getElementById('blob');
  const blobName = document.getElementById('blobName');

  // Hiệu ứng glow & pop khi click
  blob.addEventListener('click', () => {
    blob.classList.add('glow');
    setTimeout(() => blob.classList.remove('glow'), 300);
    playPopSound();
  });

  // Nhún & lăn theo kéo chuột (basic)
  let isDragging = false;

  blob.addEventListener('mousedown', () => { isDragging = true; });
  document.addEventListener('mouseup', () => { isDragging = false; });
  document.addEventListener('mousemove', (e) => {
    if(isDragging){
      blob.style.position = 'absolute';
      blob.style.left = (e.pageX - 65) + 'px';
      blob.style.top = (e.pageY - 65) + 'px';
    }
  });

  // Chế độ ngủ
  function makeSleep(){
    blob.style.transform = 'scale(0.9)';
    blob.style.opacity = '0.7';
    blobName.textContent = blobName.textContent + " 😴";
    setTimeout(() => {
      blob.style.transform = 'scale(1)';
      blob.style.opacity = '1';
      blobName.textContent = blobName.textContent.replace(' 😴','');
    }, 1500);
  }

  // Đổi tên
  function changeName(){
    const newName = prompt("Đặt tên cho cục bông của bạn:", blobName.textContent);
    if(newName) blobName.textContent = newName;
  }

  // Âm thanh pop
  function playPopSound(){
    const audio = new Audio('https://freesound.org/data/previews/331/331912_3248244-lq.mp3');
    audio.volume = 0.2;
    audio.play();
  }
</script>

</body>
</html>
