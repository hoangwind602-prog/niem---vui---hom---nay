<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little Me</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8f5f1 0%, #f4f0eb 100%);
      color: #4a4038;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 1100px;
    }

    .hero {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: #6d5b4d;
    }

    .hero p {
      margin-top: 10px;
      color: #8b7a6d;
      font-size: 1rem;
      line-height: 1.7;
    }

    .main-card {
      margin-top: 20px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(150,130,110,0.08);
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(90,70,50,0.08);
      padding: 24px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 22px;
    }

    .btn, .upload-label {
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      background: #efe7df;
      color: #5b4b3e;
      box-shadow: 0 8px 18px rgba(80,60,40,0.08);
    }

    .btn:hover, .upload-label:hover {
      transform: translateY(-2px);
      background: #e7ddd2;
    }

    input[type="file"] {
      display: none;
    }

    .editor-layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 22px;
    }

    .preview-card, .panel {
      background: #fcfaf8;
      border-radius: 24px;
      padding: 18px;
      border: 1px solid rgba(120,100,80,0.08);
    }

    .preview-wrap {
      width: 100%;
      aspect-ratio: 4 / 5;
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(135deg, #f2ebe3, #ede4db);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .preview-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.35), transparent 40%);
      pointer-events: none;
    }

    #canvas {
      max-width: 100%;
      max-height: 100%;
      border-radius: 18px;
      display: none;
    }

    .placeholder {
      text-align: center;
      color: #9d8c7f;
      padding: 30px;
      line-height: 1.8;
      font-size: 1rem;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 12px;
      color: #5c4b3e;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .filter-btn {
      border: 1px solid rgba(120,100,80,0.10);
      background: #f6f0ea;
      border-radius: 18px;
      padding: 12px;
      cursor: pointer;
      font-weight: 700;
      color: #5c4b3e;
      transition: 0.2s ease;
    }

    .filter-btn:hover {
      transform: scale(1.02);
      background: #efe6dd;
    }

    .filter-btn.active {
      background: #dfcfc1;
      color: #4b3b2f;
      border-color: rgba(100,80,60,0.16);
    }

    .slider-group {
      margin-bottom: 16px;
    }

    .slider-top {
      display: flex;
      justify-content: space-between;
      font-size: 0.92rem;
      margin-bottom: 7px;
      color: #6d5d51;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 8px;
      border-radius: 999px;
      background: #e8ddd2;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #bfa58d;
      cursor: pointer;
      border: none;
      box-shadow: 0 3px 10px rgba(90,70,50,0.15);
    }

    .small-note {
      margin-top: 16px;
      font-size: 0.92rem;
      color: #8d7c6f;
      line-height: 1.7;
      background: #f6f0ea;
      padding: 14px;
      border-radius: 18px;
    }

    .footer {
      text-align: center;
      padding: 20px 0 10px;
      color: #9b8a7e;
      font-size: 0.95rem;
    }

    @media (max-width: 900px) {
      .editor-layout {
        grid-template-columns: 1fr;
      }

      .filters {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero h1 {
        font-size: 2rem;
      }
    }

    @media (max-width: 520px) {
      .main-card {
        padding: 16px;
      }

      .filters {
        grid-template-columns: 1fr 1fr;
      }

      .btn, .upload-label {
        width: 100%;
        text-align: center;
      }

      .top-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <h1>Little Me</h1>
      <p>một phiên bản dịu dàng hơn của bạn đây ☁️</p>
    </div>

    <div class="main-card">
      <div class="top-actions">
        <label for="upload" class="upload-label">Tải ảnh lên</label>
        <input type="file" id="upload" accept="image/*" />
        <button class="btn" id="downloadBtn">Lưu ảnh</button>
        <button class="btn" id="resetBtn">Reset nhẹ</button>
      </div>

      <div class="editor-layout">
        <div class="preview-card">
          <div class="preview-wrap">
            <div class="placeholder" id="placeholder">
              Tải một tấm ảnh thật xinh lên nè ✨<br />
              rồi chọn filter đúng gu của bạn
            </div>
            <canvas id="canvas"></canvas>
          </div>
        </div>
        <div class="panel">
          <div class="section-title">Bộ lọc ảnh</div>
          <div class="filters">
            <button class="filter-btn active" data-filter="original">Original</button>
            <button class="filter-btn" data-filter="dreamy">Dreamy</button>
            <button class="filter-btn" data-filter="soft">Soft</button>
            <button class="filter-btn" data-filter="oldmoney">Old Money</button>
            <button class="filter-btn" data-filter="sunset">Sunset</button>
            <button class="filter-btn" data-filter="cool">Cool Air</button>
          </div>

          <div class="section-title">Chỉnh nhẹ cho xinh</div>

          <div class="slider-group">
            <div class="slider-top"><span>Độ sáng</span><span id="brightnessVal">100</span></div>
            <input type="range" id="brightness" min="70" max="140" value="100" />
          </div>

          <div class="slider-group">
            <div class="slider-top"><span>Mềm ảnh</span><span id="blurVal">0</span></div>
            <input type="range" id="blur" min="0" max="4" value="0" step="0.1" />
          </div>

          <div class="slider-group">
            <div class="slider-top"><span>Pastel</span><span id="pastelVal">0</span></div>
            <input type="range" id="pastel" min="0" max="60" value="0" />
          </div>

          <div class="slider-group">
            <div class="slider-top"><span>Glow</span><span id="glowVal">0</span></div>
            <input type="range" id="glow" min="0" max="40" value="0" />
          </div>

          <div class="slider-group">
            <div class="slider-top"><span>Ấm màu</span><span id="warmthVal">0</span></div>
            <input type="range" id="warmth" min="-30" max="40" value="0" />
          </div>

          <div class="small-note">
            Không cần quá nhiều hiệu ứng.<br>
            <b>“ừm… mình cũng xinh phết.”</b>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">made by Seri 💋</div>
  </div>

  <script>
    const upload = document.getElementById("upload");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const placeholder = document.getElementById("placeholder");

    const downloadBtn = document.getElementById("downloadBtn");
    const resetBtn = document.getElementById("resetBtn");
    const filterBtns = document.querySelectorAll(".filter-btn");

    const brightness = document.getElementById("brightness");
    const blur = document.getElementById("blur");
    const pastel = document.getElementById("pastel");
    const glow = document.getElementById("glow");
    const warmth = document.getElementById("warmth");

    const brightnessVal = document.getElementById("brightnessVal");
    const blurVal = document.getElementById("blurVal");
    const pastelVal = document.getElementById("pastelVal");
    const glowVal = document.getElementById("glowVal");
    const warmthVal = document.getElementById("warmthVal");

    let img = new Image();
    let currentFilter = "original";
    let imageLoaded = false;

    const filterPresets = {
      original: { brightness: 100, contrast: 100, saturate: 100, sepia: 0, hue: 0 },
      dreamy:   { brightness: 108, contrast: 95,  saturate: 108, sepia: 8, hue: 0 },
      soft:     { brightness: 105, contrast: 92,  saturate: 95,  sepia: 6, hue: 0 },
      oldmoney: { brightness: 98,  contrast: 102, saturate: 85,  sepia: 22, hue: -5 },
      sunset:   { brightness: 106, contrast: 100, saturate: 115, sepia: 18, hue: -10 },
      cool:     { brightness: 102, contrast: 96,  saturate: 92,  sepia: 0, hue: 8 }
    };

    upload.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        img.onload = function() {
          imageLoaded = true;
          placeholder.style.display = "none";
          canvas.style.display = "block";

         const maxWidth = 900;
          const maxHeight = 1100;
          let w = img.width;
          let h = img.height;

          if (w > maxWidth) {
            h *= maxWidth / w;
            w = maxWidth;
          }

          if (h > maxHeight) {
            w *= maxHeight / h;
            h = maxHeight;
          }

          canvas.width = w;
          canvas.height = h;

          drawImage();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    filterBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        filterBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        if (imageLoaded) drawImage();
      });
    });

    [brightness, blur, pastel, glow, warmth].forEach(input => {
      input.addEventListener("input", () => {
        brightnessVal.textContent = brightness.value;
        blurVal.textContent = blur.value;
        pastelVal.textContent = pastel.value;
        glowVal.textContent = glow.value;
        warmthVal.textContent = warmth.value;
        if (imageLoaded) drawImage();
      });
    });

    function drawImage() {
      if (!imageLoaded) return;

      const preset = filterPresets[currentFilter];

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.filter = `
        brightness(${(preset.brightness * brightness.value / 100)}%)
        contrast(${preset.contrast}%)
        saturate(${preset.saturate + pastel.value * 0.6}%)
        sepia(${preset.sepia + Math.max(0, warmth.value * 0.6)}%)
        hue-rotate(${preset.hue + warmth.value * 0.5}deg)
        blur(${blur.value}px)
      `;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      // pastel overlay
      if (Number(pastel.value) > 0) {
        ctx.fillStyle = `rgba(255, 235, 240, ${pastel.value / 300})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // glow overlay
      if (Number(glow.value) > 0) {
        const gradient = ctx.createRadialGradient(
          canvas.width / 2,
          canvas.height / 2,
          canvas.width * 0.1,
          canvas.width / 2,
          canvas.height / 2,
          canvas.width * 0.7
        );
        gradient.addColorStop(0, `rgba(255,255,255,${glow.value / 220})`);
        gradient.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // soft grain
      addSoftTexture();
    }

    function addSoftTexture() {
      for (let i = 0; i < 300; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const alpha = Math.random() * 0.03;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fillRect(x, y, 1.2, 1.2);
      }
    }

    resetBtn.addEventListener("click", () => {
      brightness.value = 100;
      blur.value = 0;
      pastel.value = 0;
      glow.value = 0;
      warmth.value = 0;
      brightnessVal.textContent = 100;
      blurVal.textContent = 0;
      pastelVal.textContent = 0;
      glowVal.textContent = 0;
      warmthVal.textContent = 0;
      currentFilter = "original";

      filterBtns.forEach(b => b.classList.remove("active"));
      document.querySelector('[data-filter="original"]').classList.add("active");

      if (imageLoaded) drawImage();
    });

    downloadBtn.addEventListener("click", () => {
      if (!imageLoaded) {
        alert("Tải ảnh lên trước đã nè ✨");
        return;
      }

      const link = document.createElement("a");
      link.download = "little-me-by-seri.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  </script>
</body>
</html>
