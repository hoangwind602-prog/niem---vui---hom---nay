<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dưới Ánh Sao Đêm — by Seri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#232742;
      --bg2:#3a3f67;
      --cream:#f6efe6;
      --warm:#f3d6a4;
      --peach:#efc7b4;
      --pink:#e8b8b8;
      --line:#7a5a44;
      --card:#ffffff14;
      --cardBorder:#ffffff1c;
      --text:#fffaf6;
      --softText:#f1e7dd;
      --shadow:0 18px 40px rgba(0,0,0,.22);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      margin:0;
      font-family:'Nunito',sans-serif;
      background:
        radial-gradient(circle at top, #4c527f 0%, #2d3152 40%, #1a1d33 100%);
      color:var(--text);
      overflow:hidden;
      min-height:100vh;
    }

    .hidden{display:none !important;}

    .screen{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      z-index:20;
    }

    .intro-bg{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .moon{
      position:absolute;
      top:70px;
      right:48px;
      width:90px;
      height:90px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #fff7d8, #f4dfaa 70%, #f0d28d 100%);
      box-shadow:0 0 40px rgba(255,232,171,.35);
      animation:moonFloat 5s ease-in-out infinite;
      }

    @keyframes moonFloat{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-8px);}
    }

    .star{
      position:absolute;
      width:3px;
      height:3px;
      border-radius:50%;
      background:#fff9d9;
      box-shadow:0 0 10px rgba(255,255,255,.5);
      animation:twinkle 3s infinite ease-in-out;
      opacity:.7;
    }

    @keyframes twinkle{
      0%,100%{transform:scale(1);opacity:.25;}
      50%{transform:scale(1.8);opacity:1;}
    }

    .intro-card{
      position:relative;
      z-index:2;
      width:100%;
      max-width:390px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter:blur(12px);
      border-radius:30px;
      padding:34px 26px 28px;
      text-align:center;
      box-shadow:var(--shadow);
    }

    .tiny-cloud{
      font-size:2rem;
      margin-bottom:12px;
      animation:floatSoft 3s ease-in-out infinite;
    }

    @keyframes floatSoft{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-7px);}
    }

    .title{
      font-family:'Quicksand',sans-serif;
      font-size:2rem;
      font-weight:800;
      line-height:1.2;
      margin-bottom:10px;
      color:#fff9f3;
      text-shadow:0 0 18px rgba(255,255,255,.08);
    }

    .subtitle{
      font-size:.98rem;
      line-height:1.75;
      color:#f7eee5;
      opacity:.95;
      margin-bottom:20px;
    }

    .signature{
      font-size:.9rem;
      opacity:.85;
      margin-top:12px;
      color:#f5dfc6;
      font-style:italic;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:14px 24px;
      font-size:1rem;
      font-weight:800;
      font-family:'Quicksand',sans-serif;
      background:linear-gradient(180deg, rgba(255,255,255,.28), rgba(255,255,255,.18));
      color:white;
      cursor:pointer;
      box-shadow:0 12px 26px rgba(0,0,0,.18);
      transition:.25s ease;
      margin-top:8px;
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.03);
    }

    .topbar{
      position:fixed;
      top:16px;
      left:0;
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 16px;
      z-index:12;
      pointer-events:none;
    }

    .top-pill{
      pointer-events:auto;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(10px);
      border-radius:999px;
      padding:10px 14px;
      font-weight:700;
      font-size:.95rem;
      box-shadow:0 8px 24px rgba(0,0,0,.18);
    }

    .lang-btn{
      border:none;
      background:transparent;
      color:white;
      font-weight:800;
      font-family:'Quicksand',sans-serif;
      font-size:.95rem;
      cursor:pointer;
    }

    .comic-wrap{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:74px 16px 110px;
      z-index:5;
    }

    .comic-card{
      width:100%;
      max-width:430px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:30px;
      padding:14px;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
    }

    .scene{
      position:relative;
      width:100%;
      aspect-ratio:4/5.2;
      border-radius:26px;
      overflow:hidden;
      background:linear-gradient(180deg,#31365c 0%, #262a47 48%, #20243d 100%);
      border:2px solid rgba(255,255,255,.06);
      }

    .caption-box{
      margin-top:14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      border-radius:22px;
      padding:16px 16px 18px;
      color:#fff9f2;
    }

    .caption-title{
      font-family:'Quicksand',sans-serif;
      font-size:1.08rem;
      font-weight:800;
      margin-bottom:8px;
      color:#fff6ef;
    }

    .caption-text{
      font-size:.98rem;
      line-height:1.75;
      opacity:.96;
      min-height:58px;
    }

    .nav{
      position:fixed;
      left:0;
      bottom:20px;
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      z-index:12;
      padding:0 16px;
    }

    .nav button{
      border:none;
      border-radius:999px;
      padding:13px 18px;
      font-family:'Quicksand',sans-serif;
      font-size:.98rem;
      font-weight:800;
      background:rgba(255,255,255,.14);
      color:white;
      cursor:pointer;
      backdrop-filter:blur(10px);
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .page-indicator{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      border-radius:999px;
      padding:12px 16px;
      font-weight:800;
      min-width:72px;
      text-align:center;
      backdrop-filter:blur(10px);
    }

    .footer-sign{
      position:fixed;
      bottom:78px;
      width:100%;
      text-align:center;
      z-index:8;
      font-size:.82rem;
      color:#f5dfc6;
      opacity:.82;
      pointer-events:none;
      line-height:1.6;
    }

    .bubble{
      position:absolute;
      max-width:42%;
      background:#fffaf6;
      color:#7a5a44;
      border:3px solid #8a684f;
      border-radius:20px;
      padding:10px 12px;
      font-weight:800;
      font-family:'Quicksand',sans-serif;
      font-size:.82rem;
      line-height:1.45;
      box-shadow:0 10px 20px rgba(0,0,0,.08);
      z-index:6;
    }

    .bubble:after{
      content:"";
      position:absolute;
      width:16px;
      height:16px;
      background:#fffaf6;
      border-right:3px solid #8a684f;
      border-bottom:3px solid #8a684f;
      transform:rotate(45deg);
    }

    .bubble.left:after{
      left:18px;
      bottom:-8px;
    }

    .bubble.right:after{
      right:18px;
      bottom:-8px;
      }

    /* ===== SCENE SHARED ===== */
    .room-wall{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), transparent 28%),
        linear-gradient(180deg, #3c416b 0%, #2d3154 50%, #262947 100%);
    }

    .floor{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:34%;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), transparent 30%),
        linear-gradient(180deg, #d9b998 0%, #cda983 100%);
    }

    .window{
      position:absolute;
      width:120px;
      height:138px;
      top:58px;
      right:34px;
      border-radius:20px;
      background:linear-gradient(180deg, #263154 0%, #39497d 100%);
      border:5px solid #f4e3cc;
      box-shadow:0 0 0 6px rgba(255,255,255,.04);
      overflow:hidden;
    }

    .window .moon-mini{
      position:absolute;
      width:34px;
      height:34px;
      border-radius:50%;
      top:18px;
      right:18px;
      background:radial-gradient(circle at 35% 35%, #fff7d8, #f4dfaa 72%, #eacb86 100%);
      box-shadow:0 0 20px rgba(255,236,181,.35);
    }

    .window .star-mini{
      position:absolute;
      width:4px;
      height:4px;
      border-radius:50%;
      background:#fff9d9;
      animation:twinkle 2.8s infinite ease-in-out;
    }

    .window .curtain{
      position:absolute;
      top:0;
      width:34px;
      height:100%;
      background:linear-gradient(180deg,#f7eee5,#ead6c5);
      opacity:.95;
      animation:curtainMove 4s ease-in-out infinite;
      transform-origin:top;
    }

    .window .curtain.left{ left:-6px; border-radius:0 0 20px 0; }
    .window .curtain.right{ right:-6px; border-radius:0 0 0 20px; animation-delay:1.2s; }

    @keyframes curtainMove{
      0%,100%{transform:rotate(0deg);}
      50%{transform:rotate(3deg);}
    }

    .lamp{
      position:absolute;
      left:26px;
      top:112px;
      width:42px;
      height:68px;
      z-index:2;
    }

    .lamp .shade{
      width:42px;
      height:28px;
      background:#f8dfb8;
      border-radius:18px 18px 10px 10px;
      box-shadow:0 0 28px rgba(255,215,145,.18);
    }

    .lamp .stand{
      width:8px;
      height:24px;
      background:#d7c0a2;
      margin:0 auto;
      border-radius:6px;
    }

    .lamp .base{
      width:28px;
      height:12px;
      background:#e6d3bd;
      margin:0 auto;
      border-radius:999px;
    }

    .warm-glow{
      position:absolute;
      width:180px;
      height:180px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,214,147,.22), transparent 70%);
      left:-28px;
      top:64px;
      z-index:1;
      animation:glowPulse 4s ease-in-out infinite;
    }

    @keyframes glowPulse{
      0%,100%{opacity:.72; transform:scale(1);}
      50%{opacity:1; transform:scale(1.05);}
    }

    .fan{
      position:absolute;
      right:34px;
      bottom:148px;
      width:56px;
      height:90px;
      z-index:2;
    }
    .fan .head{
      width:56px;
      height:56px;
      border-radius:50%;
      background:#e8eef4;
      border:4px solid #b7c5d1;
      position:relative;
      overflow:hidden;
    }

    .fan .blade{
      position:absolute;
      width:18px;
      height:24px;
      background:#b7c5d1;
      border-radius:14px;
      left:50%;
      top:50%;
      transform-origin:center -4px;
      margin-left:-9px;
      margin-top:-12px;
      animation:fanSpin 1.2s linear infinite;
      opacity:.82;
      }

    .fan .blade:nth-child(1){ transform:translate(-50%,-50%) rotate(0deg); }
    .fan .blade:nth-child(2){ transform:translate(-50%,-50%) rotate(120deg); }
    .fan .blade:nth-child(3){ transform:translate(-50%,-50%) rotate(240deg); }

    .fan.off .blade{
      animation:none;
      opacity:.35;
    }

    .fan .pole{
      width:8px;
      height:22px;
      background:#d3dbe1;
      margin:0 auto;
      border-radius:6px;
    }

    .fan .foot{
      width:34px;
      height:10px;
      background:#d3dbe1;
      margin:0 auto;
      border-radius:999px;
    }

    @keyframes fanSpin{
      from{transform:translate(-50%,-50%) rotate(0deg);}
      to{transform:translate(-50%,-50%) rotate(360deg);}
    }

    .bed{
      position:absolute;
      left:24px;
      bottom:82px;
      width:270px;
      height:122px;
      background:#f3e5d8;
      border-radius:24px;
      box-shadow:0 16px 22px rgba(0,0,0,.12);
      z-index:2;
    }

    .bed::before{
      content:"";
      position:absolute;
      inset:12px;
      border-radius:18px;
      background:#f7f0e8;
    }

    .blanket{
      position:absolute;
      left:18px;
      right:18px;
      bottom:16px;
      height:58px;
      border-radius:22px;
      background:linear-gradient(180deg, #f2d6d2, #e7b7b2);
      z-index:2;
      transform:rotate(-1.5deg);
    }

    .photo-frame{
      position:absolute;
      top:34px;
      left:50%;
      transform:translateX(-50%);
      width:82px;
      height:56px;
      border-radius:12px;
      border:4px solid #f0dec8;
      background:#f8f2ea;
      z-index:2;
    }

    .photo-frame::before{
      content:"❤";
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.2rem;
      opacity:.8;
    }

    .cabinet{
      position:absolute;
      left:18px;
      bottom:120px;
      width:66px;
      height:78px;
      border-radius:16px;
      background:#d8c1aa;
      z-index:2;
      box-shadow:0 12px 18px rgba(0,0,0,.10);
    }

    .cabinet::before,
    .cabinet::after{
      content:"";
      position:absolute;
      width:18px;
      height:3px;
      border-radius:999px;
      background:#b18c6c;
      left:50%;
      transform:translateX(-50%);
    }

    .cabinet::before{ top:24px; }
    .cabinet::after{ top:50px; }

    .mat{
      position:absolute;
      left:26px;
      right:26px;
      bottom:32px;
      height:110px;
      border-radius:24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 30%),
        linear-gradient(180deg,#f0d6a9,#e1bb86);
      box-shadow:0 14px 20px rgba(0,0,0,.12);
      z-index:2;
      }

    /* ===== CHIBI ===== */
    .chibi{
      position:absolute;
      z-index:4;
    }

    .head{
      position:absolute;
      border-radius:50%;
      background:#ffe3cf;
      border:3px solid #7a5a44;
      z-index:2;
    }

    .hair{
      position:absolute;
      background:#47352d;
      z-index:1;
    }

    .eye-dot{
      position:absolute;
      width:4px;
      height:7px;
      border-radius:50%;
      background:#3d2d26;
      top:22px;
    }

    .blush-dot{
      position:absolute;
      width:10px;
      height:5px;
      border-radius:50%;
      background:rgba(255,151,168,.35);
      top:30px;
    }

    .mouth-smile{
      position:absolute;
      width:12px;
      height:6px;
      border-bottom:2px solid #6a5144;
      border-radius:0 0 10px 10px;
      top:34px;
      left:50%;
      transform:translateX(-50%);
    }

    .body{
      position:absolute;
      border-radius:18px;
      z-index:1;
      border:3px solid #7a5a44;
    }

    .arm,.leg{
      position:absolute;
      background:#ffe3cf;
      border:3px solid #7a5a44;
      border-radius:999px;
      z-index:0;
    }

    .pillow{
      position:absolute;
      border-radius:18px;
      background:#fff7f2;
      border:3px solid #dcb9a4;
      box-shadow:0 8px 16px rgba(0,0,0,.08);
    }

    .bear{
      position:absolute;
      width:28px;
      height:28px;
      border-radius:50%;
      background:#cfa57f;
      border:3px solid #7a5a44;
      z-index:4;
    }

    .bear::before,
    .bear::after{
      content:"";
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:#cfa57f;
      border:3px solid #7a5a44;
      top:-8px;
    }

    .bear::before{ left:-2px; }
    .bear::after{ right:-2px; }

    .sleep-z{
      position:absolute;
      color:#fff4d8;
      font-weight:800;
      font-family:'Quicksand',sans-serif;
      text-shadow:0 0 10px rgba(255,255,255,.3);
      animation:floatSleep 2.5s ease-in-out infinite;
      z-index:5;
    }

    @keyframes floatSleep{
      0%,100%{transform:translateY(0);opacity:.6;}
      50%{transform:translateY(-8px);opacity:1;}
    }

    .fade-in{
      animation:fadeIn .6s ease;
      }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(12px) scale(.98);}
      to{opacity:1; transform:translateY(0) scale(1);}
    }

    @media (max-width: 390px){
      .title{font-size:1.8rem;}
      .caption-text{font-size:.95rem;}
      .bubble{font-size:.76rem;}
    }
  </style>
</head>
<body>

  <!-- INTRO -->
  <div class="screen" id="introScreen">
    <div class="intro-bg" id="introStars">
      <div class="moon"></div>
    </div>

    <div class="intro-card">
      <div class="tiny-cloud">☁️</div>
      <div class="title" id="introTitle">Dưới Ánh Sao Đêm</div>
      <div class="subtitle" id="introSub">
        Một câu chuyện nhỏ về một đêm mùa hè nóng nực,
        nhưng lại trở thành một ký ức rất mát trong tim.
      </div>
      <button class="btn" onclick="startStory()" id="startBtn">Mở câu chuyện</button>
      <div class="signature">made by Seri ☁️</div>
    </div>
  </div>

  <!-- TOPBAR -->
  <div class="topbar hidden" id="topbar">
    <div class="top-pill" id="storyName">Dưới Ánh Sao Đêm</div>
    <div class="top-pill">
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
    </div>
  </div>

  <!-- COMIC -->
  <div class="comic-wrap hidden" id="comicWrap">
    <div class="comic-card fade-in" id="comicCard">
      <div class="scene" id="scene"></div>

      <div class="caption-box">
        <div class="caption-title" id="captionTitle">Trang 1</div>
        <div class="caption-text" id="captionText"></div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer-sign hidden" id="footerSign">
    made by Seri ☁️<br>
    <span id="footerQuote">for the little memories that stay warm.</span>
  </div>

  <!-- NAV -->
  <div class="nav hidden" id="navBar">
    <button onclick="prevPage()" id="prevBtn">← Trước</button>
    <div class="page-indicator" id="pageIndicator">1 / 5</div>
    <button onclick="nextPage()" id="nextBtn">Sau →</button>
  </div>

  <script>
    const introScreen = document.getElementById("introScreen");
    const comicWrap = document.getElementById("comicWrap");
    const scene = document.getElementById("scene");
    const captionTitle = document.getElementById("captionTitle");
    const captionText = document.getElementById("captionText");
    const pageIndicator = document.getElementById("pageIndicator");
    const navBar = document.getElementById("navBar");
    const topbar = document.getElementById("topbar");
    const footerSign = document.getElementById("footerSign");
    const langBtn = document.getElementById("langBtn");
    const comicCard = document.getElementById("comicCard");

    let currentPage = 0;
    let currentLang = "vi";

    const pages = [
      {
        title: {
          vi: "Trang 1 — Cái nóng của mùa hè",
          en: "Page 1 — The Heat of Summer"
        },
        caption: {
          vi: "Một đêm mùa hè nóng hầm hập. Cả nhà nằm sát nhau trên chiếc giường nhỏ, quạt vẫn quay nhưng không đủ mát.",
          en: "A heavy summer night. The whole family sleeps close together on a tiny bed, while the fan spins but never feels enough."
        },
        draw: drawPage1
      },
      {
        title: {
          vi: "Trang 2 — Mất điện",
          en: "Page 2 — The Power Goes Out"
        },
        caption: {
          vi: "Rồi bỗng nhiên… điện tắt. Cả căn phòng lặng im, chỉ còn tiếng thở khẽ và cái nóng vẫn chưa chịu ngủ.",
          en: "Then suddenly… the electricity is gone. The room falls silent, except for sleepy breaths and the heat that refuses to rest."
        },
        draw: drawPage2
      },
      {
        title: {
          vi: "Trang 3 — Ôm gối ra phòng khách",
          en: "Page 3 — Carrying Pillows to the Living Room"
        },
        caption: {
          vi: "Mỗi người ôm lấy chiếc gối của mình, lục đục bước ra phòng khách như đang chuẩn bị cho một chuyến picnic nửa đêm.",
          en: "Each of them hugs their own pillow and shuffles into the living room, like getting ready for a tiny midnight picnic."
        },
        draw: drawPage3
      },
      {
        title: {
          vi: "Trang 4 — Gió trời thoảng qua",
          en: "Page 4 — The Breeze Comes In"
        },
        caption: {
